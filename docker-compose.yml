services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insighthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: insighthub
      POSTGRES_USER: insighthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insighthub -d insighthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: insighthub-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://insighthub:${POSTGRES_PASSWORD}@postgres:5432/insighthub
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  adminer:
    image: adminer:4
    container_name: insighthub-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
